name: wbc-telehealth

services:
  postgres:
    container_name: wbc-telehealth-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telehealth
      POSTGRES_PASSWORD: telehealth$$2026
      POSTGRES_DB: telehealth_db
    ports:
      - "5433:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telehealth -d telehealth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: wbc-telehealth-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: wbc-telehealth-backend
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ../../data:/data:ro
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
