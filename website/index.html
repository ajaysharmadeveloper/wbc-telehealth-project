<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="color-scheme" content="light dark" />

    <!-- Default meta (overridden per route by react-helmet-async) -->
    <title>WBC Telehealth - AI-Powered Diabetes Triage</title>
    <meta
      name="description"
      content="WBC Telehealth - AI-powered diabetes triage for small clinics. Pre-screen patients, assess risk, and recommend next steps before they walk in the door."
    />
    <meta
      name="keywords"
      content="telehealth, diabetes triage, AI healthcare, symptom checker, pre-screening, small clinics, open source healthcare"
    />
    <meta name="author" content="Weekend Vibe Builders" />

    <!--
      Canonical URL, Open Graph, and Twitter card meta tags are managed
      dynamically per-route by react-helmet-async (see src/components/SEO.jsx).
      The defaults below are fallbacks for crawlers that don't execute JS.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WBC Telehealth" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
